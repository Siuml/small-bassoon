<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #776e65;
            margin-bottom: 20px;
            font-size: 48px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-container {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .score-title {
            font-size: 14px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #9f8b77;
        }

        .power-input-container {
            background: #faf8ef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #bbada0;
        }

        .power-input-container h3 {
            color: #776e65;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .power-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .power-input {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            border: 2px solid #bbada0;
            border-radius: 5px;
            text-align: center;
        }

        .power-preview {
            font-size: 20px;
            color: #776e65;
            font-weight: bold;
            min-width: 80px;
        }

        .btn-add {
            background: #f67c5f;
        }

        .btn-add:hover {
            background: #f85d3b;
        }

        .btn-clear {
            background: #9f8b77;
        }

        .btn-clear:hover {
            background: #af9b87;
        }

        .grid-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #cdc1b4;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell-2 { background: #eee4da; }
        .cell-4 { background: #ede0c8; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .cell-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #776e65;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .click-hint {
            font-size: 12px;
            color: #9f8b77;
            margin-top: 5px;
        }

        .ai-assistant {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            color: white;
        }

        .ai-assistant h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .ai-suggestion {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .ai-direction {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 24px;
        }

        .ai-direction:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .ai-direction.best {
            background: #4ade80;
            color: #166534;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .ai-direction.best::after {
            content: " ⭐最优";
            font-size: 12px;
        }

        .ai-score {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }

        .ai-info {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="header">
            <div class="score-container">
                <div class="score-title">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <button class="btn" onclick="resetGame()">新游戏</button>
        </div>

        <div class="power-input-container">
            <h3>🎯 手动添加 2 的 n 次幂</h3>
            <div class="power-controls">
                <span>2 ^</span>
                <input type="number" class="power-input" id="powerInput" value="5" min="-1" max="20" oninput="updatePreview()">
                <span>=</span>
                <span class="power-preview" id="powerPreview">32</span>
                <button class="btn btn-add" onclick="setSelectedCell()">添加到格子</button>
                <button class="btn btn-clear" onclick="clearSelectedCell()">清空格子</button>
            </div>
            <div class="click-hint">点击下方任意格子即可设置数字</div>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <button class="btn" onclick="resetGame()">再玩一次</button>
            </div>
        </div>

        <div class="ai-assistant" id="aiAssistant">
            <h3>🤖 AI 辅助 - 实时最优棋步</h3>
            <div class="ai-suggestion" id="aiSuggestion"></div>
            <div class="ai-score" id="aiScore"></div>
            <div class="ai-info">点击方向按钮或使用键盘执行移动</div>
        </div>

        <div class="instructions">
            <p>使用 <strong>方向键</strong> 或 <strong>W/A/S/D</strong> 移动数字</p>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let gameOver = false;
        let selectedCell = null;

        function init() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            selectedCell = null;
            addNewNumber();
            addNewNumber();
            updateDisplay();
            updateAISuggestion();
            document.getElementById('gameOver').classList.remove('show');
        }

        function addNewNumber() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDisplay() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    const value = grid[i][j];
                    if (value > 0) {
                        cell.textContent = value;
                        if (value <= 2048) {
                            cell.classList.add('cell-' + value);
                        } else {
                            cell.classList.add('cell-super');
                        }
                    }

                    cell.addEventListener('click', () => selectCell(i, j));

                    if (selectedCell && selectedCell.row === i && selectedCell.col === j) {
                        cell.style.boxShadow = '0 0 0 3px #f67c5f';
                    }

                    gridElement.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function selectCell(row, col) {
            selectedCell = {row, col};
            updateDisplay();
        }

        function updatePreview() {
            const powerInput = document.getElementById('powerInput');
            const powerPreview = document.getElementById('powerPreview');
            const power = parseInt(powerInput.value);

            if (isNaN(power)) {
                powerPreview.textContent = '?';
            } else if (power === -1) {
                powerPreview.textContent = '0 (清空)';
            } else if (power < -1) {
                powerPreview.textContent = '无效';
            } else {
                const result = Math.pow(2, power);
                powerPreview.textContent = result;
            }
        }

        function setSelectedCell() {
            if (!selectedCell) {
                alert('请先点击选择要设置的格子！');
                return;
            }

            const powerInput = document.getElementById('powerInput');
            const power = parseInt(powerInput.value);

            if (isNaN(power) || power < 0) {
                alert('请输入有效的指数（0-20）！');
                return;
            }

            const value = Math.pow(2, power);
            grid[selectedCell.row][selectedCell.col] = value;
            updateDisplay();
            updateAISuggestion();
        }

        function clearSelectedCell() {
            if (!selectedCell) {
                alert('请先点击选择要清空的格子！');
                return;
            }

            grid[selectedCell.row][selectedCell.col] = 0;
            updateDisplay();
            updateAISuggestion();
        }

        function slide(row) {
            let arr = row.filter(val => val !== 0);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return zeros.concat(arr);
        }

        function combine(row) {
            for (let i = 3; i > 0; i--) {
                if (row[i] === row[i-1] && row[i] !== 0) {
                    row[i] *= 2;
                    score += row[i];
                    row[i-1] = 0;
                }
            }
            return row;
        }

        function reverse(row) {
            return row.reverse();
        }

        function transpose(grid) {
            let newGrid = [];
            for (let j = 0; j < 4; j++) {
                let row = [];
                for (let i = 0; i < 4; i++) {
                    row.push(grid[i][j]);
                }
                newGrid.push(row);
            }
            return newGrid;
        }

        function copyGrid(grid) {
            return grid.map(row => [...row]);
        }

        function compareGrid(a, b) {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (a[i][j] !== b[i][j]) return true;
                }
            }
            return false;
        }

        function simulateMove(testGrid, direction) {
            let newGrid = copyGrid(testGrid);
            let moved = false;
            let mergeScore = 0;

            const processLine = (line) => {
                let arr = line.filter(val => val !== 0);
                let result = [];
                let i = 0;
                while (i < arr.length) {
                    if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                        result.push(arr[i] * 2);
                        mergeScore += arr[i] * 2;
                        i += 2;
                    } else {
                        result.push(arr[i]);
                        i++;
                    }
                }
                while (result.length < 4) result.push(0);
                return result;
            };

            if (direction === 'left') {
                for (let i = 0; i < 4; i++) {
                    let original = [...newGrid[i]];
                    newGrid[i] = processLine(newGrid[i]);
                    if (original.join(',') !== newGrid[i].join(',')) moved = true;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let original = [...newGrid[i]];
                    newGrid[i] = reverse(processLine(reverse(newGrid[i])));
                    if (original.join(',') !== newGrid[i].join(',')) moved = true;
                }
            } else if (direction === 'up') {
                newGrid = transpose(newGrid);
                for (let i = 0; i < 4; i++) {
                    let original = [...newGrid[i]];
                    newGrid[i] = processLine(newGrid[i]);
                    if (original.join(',') !== newGrid[i].join(',')) moved = true;
                }
                newGrid = transpose(newGrid);
            } else if (direction === 'down') {
                newGrid = transpose(newGrid);
                for (let i = 0; i < 4; i++) {
                    let original = [...newGrid[i]];
                    newGrid[i] = reverse(processLine(reverse(newGrid[i])));
                    if (original.join(',') !== newGrid[i].join(',')) moved = true;
                }
                newGrid = transpose(newGrid);
            }

            return { grid: newGrid, moved, mergeScore };
        }

        function evaluatePosition(testGrid) {
            let evalScore = 0;

            const emptyCells = testGrid.flat().filter(val => val === 0).length;
            evalScore += emptyCells * 400;

            const maxNum = Math.max(...testGrid.flat());
            const corners = [
                [0, 0], [0, 3], [3, 0], [3, 3]
            ];
            for (const [i, j] of corners) {
                if (testGrid[i][j] === maxNum && maxNum > 0) {
                    evalScore += 600;
                }
            }

            let clusterScore = 0;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const current = testGrid[i][j];
                    if (current === 0) continue;

                    if (j < 3 && testGrid[i][j + 1] === current) clusterScore += current * 15;
                    if (i < 3 && testGrid[i + 1][j] === current) clusterScore += current * 15;
                    if (j > 0 && testGrid[i][j - 1] === current) clusterScore += current * 15;
                    if (i > 0 && testGrid[i - 1][j] === current) clusterScore += current * 15;
                }
            }
            evalScore += clusterScore;

            const centerPositions = [[1, 1], [1, 2], [2, 1], [2, 2]];
            for (const [i, j] of centerPositions) {
                if (testGrid[i][j] > 0 && testGrid[i][j] < 8) {
                    evalScore -= 50;
                }
            }

            const edgeBonus = [
                [0, 1], [0, 2], [1, 0], [1, 3], [2, 0], [2, 3], [3, 1], [3, 2]
            ];
            for (const [i, j] of edgeBonus) {
                if (testGrid[i][j] > 0) {
                    evalScore += testGrid[i][j] * 5;
                }
            }

            return evalScore;
        }

        function getAISuggestion() {
            const directions = ['up', 'down', 'left', 'right'];
            const directionNames = {
                'up': '⬆️',
                'down': '⬇️',
                'left': '⬅️',
                'right': '➡️'
            };

            let bestDirection = 'up';
            let bestScore = -Infinity;
            let scores = {};

            for (const direction of directions) {
                const { grid: newGrid, moved, mergeScore } = simulateMove(grid, direction);

                if (!moved) {
                    scores[direction] = -Infinity;
                    continue;
                }

                let positionScore = evaluatePosition(newGrid);
                positionScore += mergeScore;
                scores[direction] = positionScore;

                if (positionScore > bestScore) {
                    bestScore = positionScore;
                    bestDirection = direction;
                }
            }

            return { bestDirection, scores };
        }

        function updateAISuggestion() {
            if (gameOver) {
                document.getElementById('aiSuggestion').innerHTML = '<span style="font-size:16px">游戏结束！</span>';
                document.getElementById('aiScore').textContent = '';
                return;
            }

            const { bestDirection, scores } = getAISuggestion();
            const directionNames = {
                'up': '⬆️ 上',
                'down': '⬇️ 下',
                'left': '⬅️ 左',
                'right': '➡️ 右'
            };

            const aiSuggestion = document.getElementById('aiSuggestion');
            aiSuggestion.innerHTML = '';

            const directions = ['up', 'down', 'left', 'right'];
            for (const direction of directions) {
                const btn = document.createElement('div');
                btn.className = 'ai-direction';
                if (direction === bestDirection) {
                    btn.classList.add('best');
                }
                btn.textContent = directionNames[direction];
                btn.onclick = () => handleMove(direction);
                aiSuggestion.appendChild(btn);
            }

            const aiScore = document.getElementById('aiScore');
            const bestDirName = directionNames[bestDirection];
            aiScore.textContent = `推荐: ${bestDirName} | 评分: ${scores[bestDirection]}`;
        }

        function moveRight() {
            for (let i = 0; i < 4; i++) {
                grid[i] = slide(grid[i]);
                grid[i] = combine(grid[i]);
                grid[i] = slide(grid[i]);
            }
        }

        function moveLeft() {
            for (let i = 0; i < 4; i++) {
                grid[i] = reverse(grid[i]);
                grid[i] = slide(grid[i]);
                grid[i] = combine(grid[i]);
                grid[i] = slide(grid[i]);
                grid[i] = reverse(grid[i]);
            }
        }

        function moveUp() {
            grid = transpose(grid);
            moveLeft();
            grid = transpose(grid);
        }

        function moveDown() {
            grid = transpose(grid);
            moveRight();
            grid = transpose(grid);
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return false;
                    if (j < 3 && grid[i][j] === grid[i][j+1]) return false;
                    if (i < 3 && grid[i][j] === grid[i+1][j]) return false;
                }
            }
            return true;
        }

        function handleMove(direction) {
            if (gameOver) return;

            let oldGrid = copyGrid(grid);

            switch(direction) {
                case 'up':
                case 'w':
                    moveUp();
                    break;
                case 'down':
                case 's':
                    moveDown();
                    break;
                case 'left':
                case 'a':
                    moveLeft();
                    break;
                case 'right':
                case 'd':
                    moveRight();
                    break;
            }

            if (compareGrid(oldGrid, grid)) {
                addNewNumber();
                updateDisplay();
                updateAISuggestion();

                if (checkGameOver()) {
                    gameOver = true;
                    document.getElementById('gameOver').classList.add('show');
                    updateAISuggestion();
                }
            }
        }

        function resetGame() {
            init();
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.classList.contains('power-input')) {
                return;
            }

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    handleMove('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    handleMove('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    handleMove('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    handleMove('right');
                    break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) handleMove('right');
                else if (diffX < -30) handleMove('left');
            } else {
                if (diffY > 30) handleMove('down');
                else if (diffY < -30) handleMove('up');
            }
        });

        init();
        updatePreview();
    </script>
</body>
</html>
